name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-bundle:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Tesseract OCR (bundled into release)
        shell: pwsh
        run: |
          choco install tesseract --no-progress --yes
          & "C:\Program Files\Tesseract-OCR\tesseract.exe" --version

      - name: Build Windows bundle
        run: python scripts/build_exe.py

      - name: Extract release notes for tag
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v',''
          $content = Get-Content CHANGELOG.md -Raw
          $escaped = [regex]::Escape($version)
          $pattern = "(?ms)^## \[$escaped\][^\r\n]*\r?\n(.*?)(?=\r?\n## \[|\z)"
          $match = [regex]::Match($content, $pattern)
          if ($match.Success) {
            $section = $match.Groups[1].Value.Trim()
          } else {
            $section = "Release $tag"
          }
          $section | Out-File -FilePath release-notes.md -Encoding utf8

      - name: Upload to release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/JobFinder-windows.zip
          body_path: release-notes.md
          fail_on_unmatched_files: true

      - name: Upload artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: JobFinder-windows
          path: dist/JobFinder-windows.zip
          retention-days: 14
