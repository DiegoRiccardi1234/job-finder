name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff check)
        run: ruff check app/

      - name: Format check (ruff format)
        run: ruff format --check app/

      - name: Type check (mypy strict)
        run: mypy app/

      - name: Run unit tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term

      - name: Audit i18n coverage
        run: python scripts/check_i18n.py

      - name: Generate coverage badge JSON
        if: matrix.python-version == '3.12'
        run: python scripts/coverage_badge.py

      - name: Commit coverage badge JSON
        if: matrix.python-version == '3.12' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update coverage badge [skip ci]"
          file_pattern: coverage.json
